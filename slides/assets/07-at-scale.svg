<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="At scale: many agents, one broker — before and after">
<style>
svg{--bg:#ffffff;--bg-1:#ffffff;--bg-2:#f5f5f3;--bg-3:#ededeb;--border:#d4d4d8;--border-strong:#9a9aa2;--text:#111111;--text-2:#52525b;--text-3:#8a8a8a;--accent:#5b7000;--accent-2:#5b7000;--vo:#5b7000;--vis:#52525b;--cmd:#5b7000;--danger:#c01f12;--ok:#5b7000;--warn:#5b7000;}
text{font-family:'Alliance No.2',Inter,system-ui,-apple-system,sans-serif;}
text[font-family*="mono"],text[font-family*="Mono"]{font-family:'JetBrains Mono',ui-monospace,monospace;}
</style>
        <defs>
          <marker id="d4arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="var(--text-2)"/>
          </marker>
          <marker id="d4arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="var(--danger)"/>
          </marker>
        </defs>

        <!-- ============ LEFT PANEL: WITHOUT BROKERING ============ -->
        <text x="220" y="40" fill="var(--danger)" font-family="ui-sans-serif" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="1.5">WITHOUT BROKERING</text>

        <rect x="85" y="66" width="270" height="44" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
        <text x="220" y="93" fill="var(--text-2)" font-family="ui-sans-serif" font-size="13.5" text-anchor="middle">Public APIs</text>

        <g font-family="ui-sans-serif">
          <rect x="40" y="145" width="170" height="95" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
          <text x="50" y="164" fill="var(--text)" font-size="13.5" font-weight="600">Slack-bot</text>
          <text x="50" y="184" fill="var(--danger)" font-family="ui-monospace" font-size="11">xoxb-1234567890-bot</text>
          <text x="50" y="198" fill="var(--danger)" font-family="ui-monospace" font-size="11">sk-ant-api03-Xk4jPm</text>
          <text x="50" y="212" fill="var(--danger)" font-family="ui-monospace" font-size="11">whk_abc123def456gh</text>
          <text x="50" y="226" fill="var(--danger)" font-family="ui-monospace" font-size="11">eyJhbGciOiJIUzI1Ni</text>

          <rect x="225" y="145" width="170" height="95" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
          <text x="235" y="164" fill="var(--text)" font-size="13.5" font-weight="600">Coding agent</text>
          <text x="235" y="184" fill="var(--danger)" font-family="ui-monospace" font-size="11">ghp_PYdp8aALF21L1S</text>
          <text x="235" y="198" fill="var(--danger)" font-family="ui-monospace" font-size="11">sk-ant-api03-Yj5kQn</text>
          <text x="235" y="212" fill="var(--danger)" font-family="ui-monospace" font-size="11">glpat_AbCdEfGh1234</text>
          <text x="235" y="226" fill="var(--danger)" font-family="ui-monospace" font-size="11">npm_AbCdEfGhIjKlMn</text>

          <rect x="40" y="255" width="170" height="95" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
          <text x="50" y="274" fill="var(--text)" font-size="13.5" font-weight="600">Voice agent</text>
          <text x="50" y="294" fill="var(--danger)" font-family="ui-monospace" font-size="11">AC1234567890abcdef</text>
          <text x="50" y="308" fill="var(--danger)" font-family="ui-monospace" font-size="11">auth_abc123def456g</text>
          <text x="50" y="322" fill="var(--danger)" font-family="ui-monospace" font-size="11">sk-ant-api03-Zm6lRo</text>
          <text x="50" y="336" fill="var(--danger)" font-family="ui-monospace" font-size="11">pk_live_51AbCdEfGh</text>

          <rect x="225" y="255" width="170" height="95" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
          <text x="235" y="274" fill="var(--text)" font-size="13.5" font-weight="600">Browser agent</text>
          <text x="235" y="294" fill="var(--danger)" font-family="ui-monospace" font-size="11">sk-proj-AbCd1234Ef</text>
          <text x="235" y="308" fill="var(--danger)" font-family="ui-monospace" font-size="11">prx_AbCd1234EfGh56</text>
          <text x="235" y="322" fill="var(--danger)" font-family="ui-monospace" font-size="11">sb_secret_AbCd1234</text>
          <text x="235" y="336" fill="var(--danger)" font-family="ui-monospace" font-size="11">sk-ant-api03-Wq3vS</text>
        </g>

        <!-- Tangled spaghetti arrows -->
        <path d="M 125 145 L 180 110" stroke="var(--danger)" stroke-width="1" fill="none" opacity="0.45" marker-end="url(#d4arrRed)"/>
        <path d="M 310 145 L 250 110" stroke="var(--danger)" stroke-width="1" fill="none" opacity="0.45" marker-end="url(#d4arrRed)"/>
        <path d="M 125 255 L 200 112" stroke="var(--danger)" stroke-width="1" fill="none" opacity="0.45" marker-end="url(#d4arrRed)"/>
        <path d="M 310 255 L 240 112" stroke="var(--danger)" stroke-width="1" fill="none" opacity="0.45" marker-end="url(#d4arrRed)"/>

        <!-- Divider -->
        <line x1="450" y1="60" x2="450" y2="370" stroke="var(--border-strong)" stroke-dasharray="3 4"/>
        <circle cx="450" cy="265" r="22" fill="var(--bg-1)" stroke="var(--text-2)"/>
        <text x="450" y="271" fill="var(--text-2)" font-family="ui-sans-serif" font-size="22" font-weight="700" text-anchor="middle">→</text>

        <!-- ============ RIGHT PANEL: WITH BROKERING ============ -->
        <text x="680" y="40" fill="var(--ok)" font-family="ui-sans-serif" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="1.5">WITH BROKERING</text>

        <rect x="545" y="66" width="270" height="44" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
        <text x="680" y="93" fill="var(--text-2)" font-family="ui-sans-serif" font-size="13.5" text-anchor="middle">Public APIs</text>

        <g font-family="ui-sans-serif">
          <rect x="490" y="145" width="170" height="42" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
          <text x="500" y="163" fill="var(--text)" font-size="13.5" font-weight="600">Slack-bot</text>
          <text x="500" y="179" fill="var(--text-3)" font-family="ui-monospace" font-size="11.5">placeholders only</text>

          <rect x="490" y="197" width="170" height="42" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
          <text x="500" y="215" fill="var(--text)" font-size="13.5" font-weight="600">Coding agent</text>
          <text x="500" y="231" fill="var(--text-3)" font-family="ui-monospace" font-size="11.5">placeholders only</text>

          <rect x="490" y="249" width="170" height="42" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
          <text x="500" y="267" fill="var(--text)" font-size="13.5" font-weight="600">Voice agent</text>
          <text x="500" y="283" fill="var(--text-3)" font-family="ui-monospace" font-size="11.5">placeholders only</text>

          <rect x="490" y="301" width="170" height="42" rx="8" fill="var(--bg-1)" stroke="var(--border-strong)"/>
          <text x="500" y="319" fill="var(--text)" font-size="13.5" font-weight="600">Browser agent</text>
          <text x="500" y="335" fill="var(--text-3)" font-family="ui-monospace" font-size="11.5">placeholders only</text>
        </g>

        <!-- Broker, right column -->
        <rect x="700" y="185" width="170" height="170" rx="12" fill="var(--bg-1)" stroke="var(--ok)" stroke-width="1.5"/>
        <text x="785" y="206" fill="var(--text)" font-family="ui-sans-serif" font-size="15" font-weight="700" text-anchor="middle">Credential broker</text>
        <text x="785" y="223" fill="var(--text-3)" font-family="ui-sans-serif" font-size="12.5" text-anchor="middle">single trust boundary</text>
        <line x1="720" y1="238" x2="850" y2="238" stroke="var(--border-strong)"/>
        <text x="715" y="258" fill="var(--text-2)" font-family="ui-monospace" font-size="12.5">ANTHROPIC_API_KEY</text>
        <text x="715" y="275" fill="var(--text-2)" font-family="ui-monospace" font-size="12.5">GITHUB_TOKEN</text>
        <text x="715" y="292" fill="var(--text-2)" font-family="ui-monospace" font-size="12.5">STRIPE_API_KEY</text>
        <text x="715" y="309" fill="var(--text-2)" font-family="ui-monospace" font-size="12.5">SLACK_BOT_TOKEN</text>
        <text x="715" y="326" fill="var(--text-3)" font-family="ui-monospace" font-size="12.5">…</text>

        <!-- Agents → broker -->
        <path d="M 660 166 L 700 230" stroke="var(--text-2)" stroke-width="1.5" fill="none" marker-end="url(#d4arr)"/>
        <path d="M 660 218 L 700 252" stroke="var(--text-2)" stroke-width="1.5" fill="none" marker-end="url(#d4arr)"/>
        <path d="M 660 270 L 700 285" stroke="var(--text-2)" stroke-width="1.5" fill="none" marker-end="url(#d4arr)"/>
        <path d="M 660 322 L 700 320" stroke="var(--text-2)" stroke-width="1.5" fill="none" marker-end="url(#d4arr)"/>

        <!-- Broker → Public APIs -->
        <path d="M 785 185 C 770 150, 720 115, 690 108" stroke="var(--text-2)" stroke-width="2" fill="none" marker-end="url(#d4arr)"/>
        <text x="555" y="135" fill="var(--text-2)" font-family="ui-sans-serif" font-size="12.5" font-style="italic">credentials injected on egress</text>

      </svg>