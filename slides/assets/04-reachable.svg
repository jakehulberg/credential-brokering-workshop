<svg viewBox="0 0 900 490" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Network reachability">
<style>
svg{--bg:#ffffff;--bg-1:#ffffff;--bg-2:#f5f5f3;--bg-3:#ededeb;--border:#d4d4d8;--border-strong:#9a9aa2;--text:#111111;--text-2:#52525b;--text-3:#8a8a8a;--accent:#5b7000;--accent-2:#5b7000;--vo:#5b7000;--vis:#52525b;--cmd:#5b7000;--danger:#c01f12;--ok:#5b7000;--warn:#5b7000;}
text{font-family:'Alliance No.2',Inter,system-ui,-apple-system,sans-serif;}
text[font-family*="mono"],text[font-family*="Mono"]{font-family:'JetBrains Mono',ui-monospace,monospace;}
</style>
        <defs>
          <marker id="d2arrOk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0,0 L10,5 L0,10 z" fill="var(--ok)"/>
          </marker>
        </defs>

        <rect x="170" y="30" width="560" height="60" rx="10" fill="var(--bg-1)" stroke="var(--border-strong)"/>
        <text x="450" y="66" fill="var(--text-2)" font-family="ui-sans-serif" font-size="14.5" text-anchor="middle">Public internet (API hosts)</text>

        <text x="100" y="135" fill="var(--ok)" font-family="ui-sans-serif" font-size="13.5" font-weight="600">broker → public APIs ✓</text>
        <text x="800" y="135" fill="var(--danger)" font-family="ui-sans-serif" font-size="13.5" font-weight="600" text-anchor="end">agent → public ✗</text>

        <rect x="60" y="170" width="780" height="280" rx="14" fill="none" stroke="var(--border-strong)" stroke-dasharray="6 5"/>
        <text x="78" y="194" fill="var(--text-3)" font-family="ui-sans-serif" font-size="14" font-weight="700" letter-spacing="1">YOUR PRIVATE NETWORK</text>

        <rect x="120" y="220" width="280" height="160" rx="12" fill="var(--bg-1)" stroke="var(--ok)" stroke-width="1.5"/>
        <text x="140" y="246" fill="var(--text)" font-family="ui-sans-serif" font-size="15" font-weight="700">Broker host</text>
        <rect x="140" y="266" width="240" height="42" rx="8" fill="var(--bg-3)" stroke="var(--border-strong)"/>
        <text x="152" y="291" fill="var(--text)" font-family="ui-sans-serif" font-size="14">Private NIC only</text>
        <rect x="140" y="318" width="240" height="42" rx="8" fill="var(--bg-3)" stroke="var(--border-strong)"/>
        <text x="152" y="343" fill="var(--text)" font-family="ui-sans-serif" font-size="14">Control plane + proxy bound here</text>

        <rect x="500" y="220" width="280" height="160" rx="12" fill="var(--bg-1)" stroke="var(--border-strong)" stroke-width="1.5"/>
        <text x="520" y="246" fill="var(--text)" font-family="ui-sans-serif" font-size="15" font-weight="700">Agent host</text>
        <rect x="520" y="266" width="240" height="42" rx="8" fill="var(--bg-3)" stroke="var(--border-strong)"/>
        <text x="532" y="291" fill="var(--text)" font-family="ui-sans-serif" font-size="14">Private NIC only</text>
        <rect x="520" y="318" width="240" height="42" rx="8" fill="var(--bg-3)" stroke="var(--border-strong)"/>
        <text x="532" y="343" fill="var(--text)" font-family="ui-sans-serif" font-size="14">Egress firewall → broker subnet</text>

        <path d="M 260 220 V 90" fill="none" stroke="var(--ok)" stroke-width="2" marker-end="url(#d2arrOk)"/>

        <path d="M 640 220 V 90" fill="none" stroke="var(--danger)" stroke-width="2" stroke-dasharray="5 4"/>
        <line x1="624" y1="170" x2="656" y2="140" stroke="var(--danger)" stroke-width="2.5"/>

        <path d="M 640 385 V 435 H 260 V 385" fill="none" stroke="var(--ok)" stroke-width="2" marker-end="url(#d2arrOk)"/>
      </svg>