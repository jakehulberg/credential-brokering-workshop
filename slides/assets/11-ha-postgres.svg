<svg viewBox="0 0 1080 360" xmlns="http://www.w3.org/2000/svg" font-family="'Alliance No.2', Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="haArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#52525b"/>
    </marker>
  </defs>

  <!-- Agents -->
  <rect x="20" y="135" width="140" height="90" rx="10" fill="#ffffff" stroke="#9a9aa2" stroke-width="1.5"/>
  <text x="90" y="175" text-anchor="middle" fill="#111111" font-size="17" font-weight="700">Agents</text>
  <text x="90" y="198" text-anchor="middle" fill="#52525b" font-size="12">fleet</text>

  <!-- LB -->
  <path d="M 165 180 L 205 180" stroke="#52525b" stroke-width="2" fill="none" marker-end="url(#haArr)"/>
  <rect x="210" y="125" width="150" height="110" rx="10" fill="#ffffff" stroke="#9a9aa2" stroke-width="1.5"/>
  <text x="285" y="160" text-anchor="middle" fill="#111111" font-size="16" font-weight="700">Load balancer</text>
  <text x="285" y="184" text-anchor="middle" fill="#52525b" font-size="12">L7 → API :14321</text>
  <text x="285" y="204" text-anchor="middle" fill="#52525b" font-size="12">L4 → proxy :14322</text>

  <!-- Broker instances (stateless) -->
  <path d="M 365 180 L 405 180" stroke="#52525b" stroke-width="2" fill="none" marker-end="url(#haArr)"/>
  <rect x="410" y="40" width="210" height="78" rx="10" fill="#ffffff" stroke="#5b7000" stroke-width="2"/>
  <text x="515" y="74" text-anchor="middle" fill="#111111" font-size="16" font-weight="700">Broker instance</text>
  <text x="515" y="96" text-anchor="middle" fill="#5b7000" font-size="12" font-weight="600">stateless</text>
  <rect x="410" y="141" width="210" height="78" rx="10" fill="#ffffff" stroke="#5b7000" stroke-width="2"/>
  <text x="515" y="175" text-anchor="middle" fill="#111111" font-size="16" font-weight="700">Broker instance</text>
  <text x="515" y="197" text-anchor="middle" fill="#5b7000" font-size="12" font-weight="600">stateless</text>
  <rect x="410" y="242" width="210" height="78" rx="10" fill="#ffffff" stroke="#5b7000" stroke-width="2"/>
  <text x="515" y="276" text-anchor="middle" fill="#111111" font-size="16" font-weight="700">Broker instance</text>
  <text x="515" y="298" text-anchor="middle" fill="#5b7000" font-size="12" font-weight="600">stateless</text>

  <!-- arrows to Postgres -->
  <path d="M 625 79  C 690 79, 700 170, 745 178"  stroke="#52525b" stroke-width="2" fill="none" marker-end="url(#haArr)"/>
  <path d="M 625 180 L 745 180" stroke="#52525b" stroke-width="2" fill="none" marker-end="url(#haArr)"/>
  <path d="M 625 281 C 690 281, 700 190, 745 182" stroke="#52525b" stroke-width="2" fill="none" marker-end="url(#haArr)"/>

  <!-- Postgres -->
  <rect x="750" y="110" width="300" height="140" rx="10" fill="#ffffff" stroke="#5b7000" stroke-width="2"/>
  <text x="900" y="145" text-anchor="middle" fill="#111111" font-size="18" font-weight="700">PostgreSQL (shared)</text>
  <text x="900" y="174" text-anchor="middle" fill="#52525b" font-size="13">credentials, encrypted</text>
  <text x="900" y="196" text-anchor="middle" fill="#52525b" font-size="13">CA root key, encrypted</text>
  <text x="900" y="218" text-anchor="middle" fill="#52525b" font-size="13">advisory locks</text>

  <text x="540" y="346" text-anchor="middle" fill="#8a8a8a" font-size="14">Every instance reads the same CA from the DB, so any node serves the same MITM cert. Set DATABASE_URL; share AGENT_VAULT_MASTER_PASSWORD.</text>
</svg>
