<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How Agent Vault is organized: a vault holds credentials and services; agents are granted access">
<style>
svg{--bg:#ffffff;--bg-1:#ffffff;--bg-2:#f5f5f3;--bg-3:#ededeb;--border:#d4d4d8;--border-strong:#9a9aa2;--text:#111111;--text-2:#52525b;--text-3:#8a8a8a;--accent:#5b7000;--vo:#5b7000;--danger:#c01f12;}
text{font-family:'Alliance No.2',Inter,system-ui,-apple-system,sans-serif;}
</style>
<defs>
<marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="var(--text-2)"/></marker>
</defs>

<!-- agent -->
<rect x="20" y="165" width="150" height="100" rx="10" fill="var(--bg-2)" stroke="var(--border)"/>
<text x="95" y="206" text-anchor="middle" fill="var(--text)" font-size="22" font-weight="600">Agent</text>
<text x="95" y="233" text-anchor="middle" fill="var(--text-3)" font-size="14" font-family="ui-monospace, monospace">no secrets</text>

<!-- arrow agent -> vault -->
<line x1="172" y1="225" x2="236" y2="225" stroke="var(--text-2)" stroke-width="2" marker-end="url(#arr)"/>
<text x="204" y="214" text-anchor="middle" fill="var(--text-3)" font-size="11" font-family="ui-monospace, monospace">granted:</text>
<text x="204" y="246" text-anchor="middle" fill="var(--text-3)" font-size="11" font-family="ui-monospace, monospace">proxy</text>

<!-- vault container -->
<rect x="240" y="30" width="640" height="380" rx="14" fill="var(--bg-1)" stroke="var(--vo)" stroke-width="2"/>
<text x="262" y="63" fill="var(--text-3)" font-size="14" font-family="ui-monospace, monospace" letter-spacing="2">VAULT</text>
<text x="332" y="63" fill="var(--vo)" font-size="18" font-weight="700">workshop</text>

<!-- credentials panel -->
<rect x="262" y="92" width="288" height="296" rx="10" fill="var(--bg-3)" stroke="var(--border)"/>
<text x="282" y="124" fill="var(--text-2)" font-size="14" font-family="ui-monospace, monospace" letter-spacing="2">CREDENTIALS</text>
<rect x="282" y="146" width="248" height="50" rx="6" fill="var(--bg-1)" stroke="var(--border)"/>
<text x="300" y="177" fill="var(--text)" font-size="17" font-family="ui-monospace, monospace">GITHUB_TOKEN</text>
<rect x="282" y="208" width="248" height="50" rx="6" fill="var(--bg-1)" stroke="var(--border)"/>
<text x="300" y="239" fill="var(--text)" font-size="17" font-family="ui-monospace, monospace">STRIPE_KEY</text>
<text x="282" y="308" fill="var(--text-3)" font-size="14">Secrets, encrypted at rest.</text>
<text x="282" y="332" fill="var(--text-3)" font-size="14">The agent never reads them.</text>

<!-- services panel -->
<rect x="570" y="92" width="288" height="296" rx="10" fill="var(--bg-3)" stroke="var(--border)"/>
<text x="590" y="124" fill="var(--text-2)" font-size="14" font-family="ui-monospace, monospace" letter-spacing="2">SERVICES</text>
<rect x="590" y="146" width="248" height="78" rx="6" fill="var(--bg-1)" stroke="var(--border)"/>
<text x="608" y="174" fill="var(--text)" font-size="17" font-weight="600">github</text>
<text x="608" y="196" fill="var(--text-2)" font-size="14" font-family="ui-monospace, monospace">api.github.com</text>
<text x="608" y="216" fill="var(--vo)" font-size="13" font-family="ui-monospace, monospace">inject: GITHUB_TOKEN</text>
<rect x="590" y="236" width="248" height="78" rx="6" fill="var(--bg-1)" stroke="var(--border)"/>
<text x="608" y="264" fill="var(--text)" font-size="17" font-weight="600">stripe</text>
<text x="608" y="286" fill="var(--text-2)" font-size="14" font-family="ui-monospace, monospace">api.stripe.com</text>
<text x="608" y="306" fill="var(--vo)" font-size="13" font-family="ui-monospace, monospace">inject: STRIPE_KEY</text>
</svg>
